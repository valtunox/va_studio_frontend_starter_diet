# For VM deploy only: frontend uses pre-pulled image (no build). Nginx builds from ./nginx.
services:
  frontend:
    container_name: studioapp-frontend-diet
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    ports:
      - "3059:3059"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3059/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - studioapp-net-diet

  nginx:
    container_name: studioapp-nginx-diet
    image: ${NGINX_IMAGE:-studioapp-nginx-diet:latest}
    restart: unless-stopped
    build:
      context: ./nginx
      dockerfile: Dockerfile
      args:
        APP_PORT: 3059
        HTTP_PORT: 80
    ports:
      - "80:80"
      - "443:443"
    environment:
      - app_name=studioapp-frontend-diet
      - app_port=3059
    volumes:
      - ${SSL_CERTS_PATH:-./certs}:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - studioapp-net-diet

networks:
  studioapp-net-diet:
    driver: bridge
